<!DOCTYPE html>
<html>
<head>
<title>Student Result Calculator</title><br>
<style>
    body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ed1927, #fe00ba);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 30px;
    text-align: center;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

h2{
    margin-bottom: 15px;
}

input{
    width: 90%;
    padding: 8px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid gray;
}

button{
    background-color: #181616;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background-color: #0056b3;
}

#result{
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>
<body>

<h2>Student Result Calculator</h2>

<label>Number of Subjects:</label>
<input type="number" id="subjects"><br><br>

<button onclick="calculationgrade()">Calculate Result</button>

<p id="result"></p>

<script src="main.js"></script>

</body>
</html>
